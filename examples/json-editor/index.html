<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Editor</title>
    <link rel="stylesheet" href="main.css">
</head>

<body>

    <header>
        <h1>JSON Studio</h1>
        <span id="status-badge" class="status-badge">Loaded</span>
    </header>

    <main>
        <div id="drop-zone">
            <div class="drop-icon">📂</div>
            <div class="drop-text">Drag & drop a JSON file here<br>or click to browse</div>
            <button class="primary" onclick="document.getElementById('file-input').click()">Select File</button>
            <input type="file" id="file-input" accept=".json">
        </div>

        <div id="editor-container">
            <div class="editor-toolbar">
                <div class="file-info" id="file-path-display">local_file.json</div>
                <div class="btn-group">
                    <button onclick="formatJSON()">Format</button>
                    <button class="validate-btn" onclick="validateJSON()">✓ Validate</button>
                    <button onclick="downloadFile()">⬇ Download</button>
                    <button id="upload-btn" class="primary" onclick="uploadFile()">Upload</button>
                </div>
            </div>
            <div class="editor-wrapper">
                <div class="line-numbers" id="line-numbers"></div>
                <textarea id="json-editor" spellcheck="false" placeholder="Loading or empty..."></textarea>
                <div class="zoom-controls">
                    <button class="zoom-btn" onclick="zoomIn()" title="Zoom In">+</button>
                    <div class="zoom-label" id="zoom-label">100%</div>
                    <button class="zoom-btn" onclick="zoomOut()" title="Zoom Out">−</button>
                </div>
            </div>
            <div id="error-bar"></div>
        </div>
    </main>

    <div id="toast">Notification</div>

    <script src="main.js"></script>
</body>

</html>
